name: Coverity Scan

on:
  schedule:
    # Weekly on Tuesday at 05:00 UTC
    - cron: '0 5 * * 2'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverity:
    name: Coverity Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub Security tab

    steps:
      - name: Clean up previous run
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          find "$WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Coverity Scan
        uses: ./.github/actions/analysis/coverity
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_TOKEN }}
          COVERITY_EMAIL: ${{ secrets.COVERITY_EMAIL }}

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        if: always()
        with:
          sarif_file: reports/coverity-results.sarif
          category: coverity
