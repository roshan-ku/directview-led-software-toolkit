name: Transmitter Trivy Scan
permissions: read-all

on:
  workflow_dispatch:
  push:
    branches:
      - main
  

jobs:
  trivy_job:
    name: Trivy Scan
    runs-on: self-hosted

    steps:
      - name: Check the system
        run: |
          uname -a
          git version
          trivy --version || echo "Trivy not found in current PATH"

      - name: Clean up previous run
        run: |
          echo "Cleaning up previous run"
          rm -rf "${{ github.workspace }}/build"
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          rm -rf /tmp/trivy-*

      - name: Checkout repository
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/intel-innersource/applications.media.ledvideowall.gardencove-next.transmitter-app.git .
          git checkout ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Verify Trivy installation
        run: |
          if ! command -v trivy > /dev/null 2>&1; then
            echo "ERROR: Trivy is not installed or not available in PATH for the runner user."
            echo "Install Trivy on the self-hosted runner and ensure PATH includes the binary location."
            echo "If installed via snap, verify /snap/bin is available to the runner service."
            exit 1
          fi
          trivy --version

      - name: Trivy filesystem scan
        run: |
          REPORT_DIR="$HOME/trivy-scan/${{ github.repository }}/${{ github.run_id }}"
          mkdir -p "$REPORT_DIR"
          cd "${{ github.workspace }}"
          trivy fs --list-all-pkgs --format json \
            --output "$REPORT_DIR/trivy-fs-full-report.json" . || true
          [ -f "$REPORT_DIR/trivy-fs-full-report.json" ] && \
            cp "$REPORT_DIR/trivy-fs-full-report.json" /tmp/trivy-fs-full-report.json
          trivy fs --ignore-unfixed . | tee /tmp/trivy-fs-full-report.txt "$REPORT_DIR/trivy-fs-full-report.txt"

      - name: Trivy config scan
        run: |
          REPORT_DIR="$HOME/trivy-scan/${{ github.repository }}/${{ github.run_id }}"
          mkdir -p "$REPORT_DIR"
          cd "${{ github.workspace }}"
          trivy config . | tee /tmp/trivy-config-report.txt "$REPORT_DIR/trivy-config-report.txt" || true

      - name: Trivy secret scan
        run: |
          REPORT_DIR="$HOME/trivy-scan/${{ github.repository }}/${{ github.run_id }}"
          mkdir -p "$REPORT_DIR"
          cd "${{ github.workspace }}"
          trivy fs --scanners secret . | tee /tmp/trivy-secret-report.txt "$REPORT_DIR/trivy-secret-report.txt" || true

      - name: Upload Scan artifact to Github
        uses: actions/upload-artifact@v4
        with:
          name: Trivy-reports
          path: /tmp/trivy-*

      - name: Upload trivy scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-reports-${{ github.run_id }}
          path: ${{ env.HOME }}/trivy-scan/${{ github.repository }}/${{ github.run_id }}/
          retention-days: 30
