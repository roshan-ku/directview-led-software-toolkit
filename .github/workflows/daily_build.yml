name: Daily Build

on:
  schedule:
    # Run at 10:00 PM UTC, Monday through Friday
    - cron: '0 22 * * 1-5'

  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Daily Build

    runs-on: self-hosted

    steps:
      - name: Clean up previous run
        run: |
          echo "Cleaning up previous run artifacts"
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build dvledtx
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      - name: Run unit tests
        uses: ./.github/actions/unit-tests

      - name: Static analysis
        uses: ./.github/actions/static-analysis

      - name: Upload daily build reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dvledtx-build-artifacts-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 30
