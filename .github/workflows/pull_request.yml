name: Pull Request

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    branches:
      - main

  push:
    branches-ignore:
      - main

  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pull-request:
    name: Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Clean up previous run
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          find "$WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      - name: Unit tests
        uses: ./.github/actions/unit-tests

      - name: ShellCheck
        uses: ./.github/actions/analysis/shellcheck

      - name: zizmor Scan
        uses: ./.github/actions/analysis/zizmor

      - name: cppcheck
        uses: ./.github/actions/analysis/cppcheck

      # - name: Coverity Scan
      #   uses: ./.github/actions/analysis/coverity
      #   with:
      #     coverity-url: ${{ secrets.COVERITY_URL }}
      #     coverity-user: ${{ secrets.COVERITY_ARTIFACTORY_USER }}
      #     coverity-password: ${{ secrets.COVERITY_ARTIFACTORY_PASSWORD }}

      - name: Trivy Scan
        uses: ./.github/actions/analysis/trivy

      - name: checksec Analysis
        uses: ./.github/actions/analysis/checksec

      - name: Upload PR reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: DVLED-SW-TK-PR-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 30
