name: Pull Request

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    branches-ignore:
      - main

  push:
    branches-ignore:
      - main

  workflow_dispatch:

jobs:
  pull-request:
    name: Pull Request
    runs-on: self-hosted

    steps:
      - name: Clean up previous run
        run: |
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build dvledtx
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      - name: Run unit tests
        uses: ./.github/actions/unit-tests

      - name: Static analysis
        uses: ./.github/actions/static-analysis

      - name: Upload PR reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dvledtx-pr-artifacts-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 30
