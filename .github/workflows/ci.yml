name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: Continuous Integration
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Clean up previous run
        run: |
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          rm -rf /tmp/trivy-*

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build dvledtx
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      - name: Run unit tests
        uses: ./.github/actions/unit-tests

      - name: ShellCheck
        uses: ./.github/actions/analysis/shellcheck

      - name: cppcheck
        uses: ./.github/actions/analysis/cppcheck

      - name: Coverity Scan
        uses: ./.github/actions/analysis/coverity

      - name: Trivy Scan
        uses: ./.github/actions/analysis/trivy

      - name: Upload all reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: all-scan-reports-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 30
