name: Continuous Integration

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Clean up previous run
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          find "$WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          rm -rf /tmp/trivy-*

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      - name: Unit tests
        uses: ./.github/actions/unit-tests

      - name: ShellCheck
        uses: ./.github/actions/analysis/shellcheck

      - name: zizmor Scan
        uses: ./.github/actions/analysis/zizmor

      - name: cppcheck
        uses: ./.github/actions/analysis/cppcheck

      - name: Trivy Scan
        uses: ./.github/actions/analysis/trivy

      - name: checksec Analysis
        uses: ./.github/actions/analysis/checksec

      - name: Coverity Scan
        uses: ./.github/actions/analysis/coverity
        env:
          COVERITY_TOKEN: ${{ secrets.COVERITY_TOKEN }}
          COVERITY_PROJECT: OpenVisualCloud/directview-led-software-toolkit
          COVERITY_SCAN_USER: ${{ secrets.COVERITY_SCAN_USER }}
          COVERITY_SCAN_PASSWORD: ${{ secrets.COVERITY_SCAN_PASSWORD }}
          COVERITY_URL: ${{ secrets.COVERITY_URL }}
          COVERITY_USER: ${{ secrets.COVERITY_ARTIFACTORY_USER }}
          COVERITY_PASSWORD: ${{ secrets.COVERITY_ARTIFACTORY_PASSWORD }}

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@ff0a06e83cb2de871e5a09832bc6a81e7276941f # v3.28.18
        if: always()
        with:
          sarif_file: reports/coverity-results.sarif
          category: coverity

      - name: Upload all reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: DVLED-SW-TK-CI-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 30
