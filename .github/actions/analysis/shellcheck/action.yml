name: 'ShellCheck'
description: 'Run shellcheck on shell scripts. Report written to $GITHUB_WORKSPACE/reports/'

runs:
  using: composite
  steps:
    - name: Install ShellCheck
      shell: bash
      run: |
        if command -v shellcheck &>/dev/null; then
          echo "[OK] shellcheck already installed: $(shellcheck --version | head -2)"
          exit 0
        fi
        echo "Installing shellcheck..."
        sudo apt-get update -qq
        sudo apt-get install -y -qq shellcheck
        echo "Installed: $(shellcheck --version | head -2)"

    - name: shellcheck scripts
      shell: bash
      run: |
        REPORT_DIR="$GITHUB_WORKSPACE/reports"
        mkdir -p "$REPORT_DIR"
        echo "===== shellcheck Script Analysis ====="
        shellcheck --color=never scripts/build.sh scripts/test.sh 2>&1 | tee "$REPORT_DIR/shellcheck-report.txt" || true
        echo "shellcheck scan complete. Report: $REPORT_DIR/shellcheck-report.txt"
