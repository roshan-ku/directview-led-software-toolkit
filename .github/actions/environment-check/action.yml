name: 'Environment Setup'
description: 'Install and verify all required libraries and tools on the runner'

inputs:
  dpdk-version:
    description: 'DPDK version to build'
    required: false
    default: '25.11'
  mtl-version:
    description: 'MTL release tag to build'
    required: false
    default: 'ffmpeg-plugin-extra-pixel-format'
  ffmpeg-version:
    description: 'FFmpeg release branch to build'
    required: false
    default: '7.0'

runs:
  using: composite
  steps:
    - name: Restore environment cache
      id: env-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ${{ runner.temp }}/dvledtx-deps
          ${{ runner.temp }}/mtl-source
        key: env-dpdk-${{ inputs.dpdk-version }}-mtl-${{ inputs.mtl-version }}-ffmpeg-${{ inputs.ffmpeg-version }}-${{ runner.os }}

    - name: Deploy cache to system
      if: steps.env-cache.outputs.cache-hit == 'true'
      shell: bash
      run: |
        echo "===== Deploying cached deps to system ====="
        DEPS_DIR="$RUNNER_TEMP/dvledtx-deps"
        if [ ! -d "$DEPS_DIR" ]; then
          echo "  No cached deps found, will build from source."
          exit 0
        fi

        # Bulk copy the full DESTDIR tree to /
        sudo cp -rp "$DEPS_DIR/." /
        sudo ldconfig
        echo "  Cache deployed. Size: $(du -sh "$DEPS_DIR" | cut -f1)"

        # --- Explicit FFmpeg binary copy and restore confirmation ---
        echo ""
        echo "  --- FFmpeg explicit restore check ---"
        FFMPEG_SRC_BIN=$(find "$DEPS_DIR" -type f -name "ffmpeg" | head -1)
        FFMPEG_LIB_DIR=$(find "$DEPS_DIR" -type d -name "lib" | grep -v pkgconfig | head -1)

        # Copy FFmpeg binary explicitly if found in DESTDIR snapshot
        if [ -n "$FFMPEG_SRC_BIN" ]; then
          DEST_BIN="/usr/local/bin/ffmpeg"
          sudo cp -p "$FFMPEG_SRC_BIN" "$DEST_BIN"
          echo "  [OK] Copied ffmpeg binary: $FFMPEG_SRC_BIN -> $DEST_BIN"
        else
          echo "  [WARN] ffmpeg binary not found in cache snapshot ($DEPS_DIR)"
        fi

        # Copy FFmpeg shared libraries explicitly
        if [ -n "$FFMPEG_LIB_DIR" ]; then
          sudo find "$FFMPEG_LIB_DIR" -name "libav*.so*" -o -name "libsw*.so*" | \
            while read -r SOFILE; do
              sudo cp -p "$SOFILE" /usr/local/lib/
              echo "  [OK] Copied $(basename "$SOFILE")"
            done
          sudo ldconfig
        else
          echo "  [WARN] FFmpeg lib dir not found in cache snapshot"
        fi

        # Confirm each FFmpeg lib is registered
        echo ""
        echo "  --- FFmpeg restore confirmation ---"
        ALL_OK=1
        for LIB in libavformat libavcodec libavutil libavdevice libswscale; do
          LIB_PATH=$(ldconfig -p | grep "^\s*${LIB}\.so" | awk '{print $NF}' | head -1)
          if [ -n "$LIB_PATH" ]; then
            echo "  [OK] $LIB -> $LIB_PATH"
          else
            echo "  [FAIL] $LIB not found after restore"
            ALL_OK=0
          fi
        done
        FFMPEG_BIN=$(command -v ffmpeg 2>/dev/null || true)
        if [ -n "$FFMPEG_BIN" ]; then
          echo "  [OK] ffmpeg binary in PATH: $FFMPEG_BIN"
        else
          echo "  [FAIL] ffmpeg binary not found in PATH after restore"
          ALL_OK=0
        fi
        if [ "$ALL_OK" -eq 0 ]; then
          echo "ERROR: FFmpeg restore incomplete — cache may be corrupt."
          exit 1
        fi

    - name: Install APT packages
      shell: bash
      run: |
        echo "===== APT Package Setup ====="
        PKGS="git gcc meson python3 python3-pip pkg-config libnuma-dev libjson-c-dev libpcap-dev libgtest-dev libssl-dev systemtap-sdt-dev llvm clang flex byacc libcmocka-dev nasm wget patch unzip shellcheck cppcheck"
        MISSING=""
        for pkg in $PKGS; do
          if dpkg -s "$pkg" &>/dev/null; then
            echo "  [OK] $pkg"
          else
            MISSING="$MISSING $pkg"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo "  Installing missing packages:$MISSING"
          sudo apt-get update -qq
          sudo apt-get install -y -qq $MISSING
        fi
        echo "All required APT packages present."

    - name: Install pip packages
      shell: bash
      run: |
        echo "===== pip Package Setup ====="
        PIP_PKGS="pyelftools ninja gcovr zizmor"
        MISSING=""
        for pkg in $PIP_PKGS; do
          if pip3 show "$pkg" &>/dev/null; then
            echo "  [OK] $pkg"
          else
            MISSING="$MISSING $pkg"
          fi
        done
        if [ -n "$MISSING" ]; then
          echo "  Installing missing pip packages:$MISSING"
          pip3 install --break-system-packages $MISSING
        fi
        echo "All required pip packages present."

    - name: Check system libraries
      shell: bash
      run: |
        echo "===== System Library Check ====="
        for LIB in m pthread; do
          if ldconfig -p | grep -q "lib${LIB}\.so"; then
            echo "  [OK] lib${LIB}"
          else
            echo "  [MISSING] lib${LIB}"
            echo "ERROR: lib${LIB} not found — this is unexpected on Ubuntu."
            exit 1
          fi
        done
        echo "All required system libraries present."

    - name: Build and install DPDK
      shell: bash
      env:
        DPDK_VERSION: ${{ inputs.dpdk-version }}
        MTL_VERSION: ${{ inputs.mtl-version }}
      run: |
        echo "===== DPDK Setup ====="
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}
        if pkg-config --exists libdpdk 2>/dev/null; then
          echo "  [OK] libdpdk ($(pkg-config --modversion libdpdk)) — skipping build (cached)"
          exit 0
        fi
        echo "  Building DPDK $DPDK_VERSION from source..."
        MTL_SOURCE="$RUNNER_TEMP/mtl-source"
        if [ ! -d "$MTL_SOURCE" ]; then
          git clone https://github.com/OpenVisualCloud/Media-Transport-Library.git "$MTL_SOURCE"
          cd "$MTL_SOURCE" && git checkout "$MTL_VERSION"
        fi
        cd "$RUNNER_TEMP"
        git clone https://github.com/DPDK/dpdk.git
        cd dpdk
        git checkout "v$DPDK_VERSION"
        git switch -c "v$DPDK_VERSION"
        git apply "$MTL_SOURCE"/patches/dpdk/"$DPDK_VERSION"/*.patch
        meson setup build
        ninja -C build
        DESTDIR="$RUNNER_TEMP/dvledtx-deps" ninja install -C build
        sudo ninja install -C build
        sudo ldconfig
        echo "  DPDK installed: $(pkg-config --modversion libdpdk)"

    - name: Build and install MTL
      shell: bash
      env:
        MTL_VERSION: ${{ inputs.mtl-version }}
      run: |
        echo "===== MTL Setup ====="
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}
        if pkg-config --exists mtl 2>/dev/null; then
          echo "  [OK] mtl ($(pkg-config --modversion mtl)) — skipping build (cached)"
          exit 0
        fi
        echo "  Building MTL $MTL_VERSION from source..."
        MTL_SOURCE="$RUNNER_TEMP/mtl-source"
        if [ ! -d "$MTL_SOURCE" ]; then
          git clone https://github.com/OpenVisualCloud/Media-Transport-Library.git "$MTL_SOURCE"
          cd "$MTL_SOURCE" && git checkout "$MTL_VERSION"
        fi
        cd "$MTL_SOURCE"
        ./build.sh
        # build.sh runs sudo ninja install internally, leaving meson-logs owned by root.
        # Restore runner ownership so the unprivileged DESTDIR capture can write install-log.txt.
        sudo chown -R "$(id -u):$(id -g)" "$MTL_SOURCE/build/meson-logs"
        DESTDIR="$RUNNER_TEMP/dvledtx-deps" ninja -C "$MTL_SOURCE/build" install
        sudo ldconfig
        echo "  MTL installed: $(pkg-config --modversion mtl)"

    - name: Build and install openh264
      shell: bash
      run: |
        echo "===== openh264 Setup ====="
        if ldconfig -p | grep -q libopenh264; then
          echo "  [OK] openh264 already installed"
          exit 0
        fi
        echo "  Building openh264 from source..."
        cd "$HOME"
        git clone https://github.com/cisco/openh264.git
        cd openh264
        git checkout openh264v2.4.0
        make -j "$(nproc)"
        make install DESTDIR="$RUNNER_TEMP/dvledtx-deps"
        sudo make install
        sudo ldconfig
        echo "  openh264 installed."

    - name: Build and install FFmpeg with MTL plugin
      shell: bash
      env:
        FFMPEG_VERSION: ${{ inputs.ffmpeg-version }}
        MTL_VERSION: ${{ inputs.mtl-version }}
      run: |
        echo "===== FFmpeg Setup ====="
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}
        if pkg-config --exists libavformat libavcodec libavutil libavdevice 2>/dev/null; then
          echo "  [OK] FFmpeg already installed — skipping build (cached)"
          exit 0
        fi
        echo "  Building FFmpeg $FFMPEG_VERSION with MTL plugin from source..."
        MTL_SOURCE="$RUNNER_TEMP/mtl-source"
        cd "$RUNNER_TEMP"
        git clone https://github.com/FFmpeg/FFmpeg.git
        cd FFmpeg
        git checkout "release/$FFMPEG_VERSION"
        git apply "$MTL_SOURCE"/ecosystem/ffmpeg_plugin/"$FFMPEG_VERSION"/*.patch
        cp "$MTL_SOURCE"/ecosystem/ffmpeg_plugin/mtl_*.c libavdevice/
        cp "$MTL_SOURCE"/ecosystem/ffmpeg_plugin/mtl_*.h libavdevice/
        ./configure --enable-shared --disable-static --enable-pic \
           --enable-libopenh264 --enable-encoder=libopenh264 --enable-mtl
        make -j "$(nproc)"
        make install DESTDIR="$RUNNER_TEMP/dvledtx-deps"
        sudo make install
        sudo ldconfig
        echo "  FFmpeg installed."

    - name: Verify build dependencies
      shell: bash
      run: |
        echo "===== Build Dependency Verification ====="
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:${PKG_CONFIG_PATH:-}
        FAILED=""
        for DEP in libavformat libavcodec libavutil libswscale libavdevice mtl; do
          if pkg-config --exists "$DEP" 2>/dev/null; then
            VER=$(pkg-config --modversion "$DEP" 2>/dev/null || echo "unknown")
            echo "  [OK] $DEP ($VER)"
          else
            echo "  [FAIL] $DEP"
            FAILED="$FAILED $DEP"
          fi
        done
        if [ -n "$FAILED" ]; then
          echo "ERROR: Missing build dependencies after setup:$FAILED"
          exit 1
        fi
        echo "All build dependencies verified."

    - name: Verify FFmpeg MTL plugin
      shell: bash
      run: |
        echo "===== FFmpeg MTL Plugin Verification ====="

        # Locate the binary first
        FFMPEG_PATH=$(which ffmpeg 2>/dev/null || true)
        if [ -z "$FFMPEG_PATH" ]; then
          echo "ERROR: ffmpeg not found in PATH (which ffmpeg returned nothing)."
          echo "  PATH=$PATH"
          exit 1
        fi
        echo "  [OK] ffmpeg binary: $FFMPEG_PATH"

        # Run ffmpeg -version and print full output
        echo "  --- ffmpeg -version output ---"
        FFMPEG_VERSION_OUT=$(ffmpeg -version 2>&1)
        echo "$FFMPEG_VERSION_OUT"
        FFMPEG_VER=$(echo "$FFMPEG_VERSION_OUT" | head -1)
        if [ -z "$FFMPEG_VER" ]; then
          echo "ERROR: ffmpeg -version returned no output."
          exit 1
        fi
        echo "  [OK] ffmpeg version: $FFMPEG_VER"

        # Check MTL device is registered
        echo "  --- ffmpeg -devices output ---"
        DEVICES=$(ffmpeg -devices 2>&1)
        echo "$DEVICES"
        if echo "$DEVICES" | grep -qi "mtl"; then
          MTL_DEVICES=$(echo "$DEVICES" | grep -i "mtl")
          echo "  [OK] MTL device(s) registered in FFmpeg avdevices:"
          echo "$MTL_DEVICES" | sed 's/^/    /'
        else
          echo "ERROR: FFmpeg MTL plugin not found after build."
          exit 1
        fi

    - name: Report cache size
      if: steps.env-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        echo "===== Cache Content Summary ====="
        du -sh "$RUNNER_TEMP/dvledtx-deps" || true

    - name: Save environment cache (main branch only)
      if: steps.env-cache.outputs.cache-hit != 'true' && github.ref == 'refs/heads/main'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ${{ runner.temp }}/dvledtx-deps
          ${{ runner.temp }}/mtl-source
        key: env-dpdk-${{ inputs.dpdk-version }}-mtl-${{ inputs.mtl-version }}-ffmpeg-${{ inputs.ffmpeg-version }}-${{ runner.os }}
